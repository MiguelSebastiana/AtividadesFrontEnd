<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel de Monitoramento</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
        <div class="gridTopbar"></div>
            <div class="topbar">
                <span>
                    <p class="raio">⚡️</p>
                    <h2>STATUS DE OPERAÇÃO GLOBAL</h2>
                    <h3>SISTEMA OPERAL: NOMINAL</h3>
                    <button class="buttomTopbar">Relatório completo</button>
                </span>
            </div>
        </div>

        <br><br><br>
    
        <div class="gridBlocos">
                <span class="quadro">
                    <h1 class="icone">P</h1>
                    <h2 class="titulo">PRESSÃO</h2>
                    <h1 class="valor">120 PSI</h1>
                    <p class="linkBloco"><a href="/">Ver histórico</a></p>
                </span>
                <span class="quadro">
                    <h1 class="icone">T</h1>
                    <h2 class="titulo">TEMPERATURA</h2>
                    <h1 class="valor">45.2 °C</h1>
                    <p class="linkBloco"><a href="/">Ver histórico</a></p>
                </span>
                <span class="quadroSelect">
                    <h1 class="icone">R</h1>
                    <h2 class="titulo">ROTAÇÃO</h2>
                    <h1 class="valor">1850 RPM</h1>
                    <p class="linkBloco"><a href="/">Ver histórico</a></p>
                </span>
                <span class="quadro">
                    <h1 class="icone">C</h1>
                    <h2 class="titulo">CARGA</h2>
                    <h1 class="valor">82%</h1>
                    <p class="linkBloco"><a href="/">Ver histórico</a></p>
                </span>
                <span class="quadro">
                    <h1 class="icone">U</h1>
                    <h2 class="titulo">UMIDADE</h2>
                    <h1 class="valor">12%</h1>
                    <p class="linkBloco"><a href="/">Ver histórico</a></p>
                </span>

        </div>
    
</body>
</html>
