<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard de Monitoramento Industrial</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    
    <div class="container">

        <div class="title">
            <h1> SISTEMA DE GESTÃO INDUSTRIAL V2.4</h1>
        </div>

        <div class="linha"></div>

        <div class="cabecalho">
            <p>Linha de Montagem</p>
        </div>

        <div class="linhaDeMontagem">

            <div class="quadroLinhaMontagem">
                <h2>Braço Robótico A</h2>
            </div>
            <div class="quadroLinhaMontagem">
                <h2>Esteira de Pintura</h2>
            </div>
            <div class="quadroLinhaMontagem">
                <h2>Controle de Qualidade</h2>
            </div>
        </div>

        <div class="cabecalho">
            <p>Painel de Sensores</p>
        </div>

        <div class="painelDeSensores">
            <div class="quadroPainelDeSensores">
                <h2>Temperatura de Forno</h2>
            </div>
            <div class="quadroPainelDeSensores">
                <h2>Pressão Hidráulica</h2>
            </div>
            <div class="quadroPainelDeSensores">
                <h2>Nível de Energia</h2>
            </div>
            <div class="quadroPainelDeSensores">
                <h2>Status de Rede</h2>
            </div>
        </div>

        <div class="cabecalho">
            <p>Logs </p>
        </div>


    </div>
</body>
</html>
