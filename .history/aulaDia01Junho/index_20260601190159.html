<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Terminal de Monitoramento </title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">

        <div class="painelLateral">

            <div>
                <h2 class="icone">⚙️</h2>
                <h2>Sistema <br> Esteira</h2>
            </div>

            <div class="linha"></div>

            <div class="buttons">
                <button class="buttonLigarPausar">Ligar</button>
                <button class="buttonLigarPausar">Pausar</button>
                <button class="paradaEmergencia">Parada Emergência</button>
            </div>
            
        </div>

        <div class="gridDeMonitoramento">

            <div class="card">
                <h2 class="tituloCard">Sensor Óptico 01</h2>
                <h1 class="valorCard">145 m/min</h1>
            </div>

            <div class="card">
                <h2 class="tituloCard">Sensor Temperatura</h2>
                <h1 class="valorCardAnomalia">84°C</h1>
            </div>

            <div class="card">
                <h2 class="tituloCard">Carga de Rede</h2>
                <h1 class="valorCardRede">VPN Estável</h1>
            </div>

            <div class="cardInferior">
                <h2 class="tituloCard">Contador de Peças</h2>
                <h1 class="valorCard">1.250 un</h1>
            </div>

            <div class="cardInferior">
                <h2 class="tituloCard">Pressão Hidráulica</h2>
                <h1 class="valorCard">4.2 bar</h1>
            </div>

        </div>

        <div class="sistemaDeAlertas">
            <h2>Operador: Central_02</h2>
            <h2>Sistema: Online</h2>
        </div>
    </div>
    
</body>
</html>
